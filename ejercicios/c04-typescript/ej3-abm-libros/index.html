<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Ejercicio 3 - ABM Libros</title>
    <style>
        .error { color: red; font-weight: bold; }
        li { margin-bottom: 10px; }
    </style>
</head>
<body>
    <h1>Gestión de Libros (ABM)</h1>

    <fieldset>
        <legend>Agregar Nuevo Libro</legend>
        <input type="text" id="titulo" placeholder="Título">
        <input type="text" id="autor" placeholder="Autor">
        <input type="number" id="precio" placeholder="Precio">
        <label><input type="checkbox" id="disponible" checked> Disponible</label>
        <button id="btnAgregar">Agregar Libro</button>
        <div id="errorForm" class="error"></div>
    </fieldset>

    <hr>
    <h2>Listado de Libros</h2>
    <p id="stats"></p>
    <ul id="listado"></ul>

    <script src="app.js"></script>
</body>
</html>
